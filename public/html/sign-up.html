<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign-up</title>
    <link rel="stylesheet" href="/public/css/sign-up.css" />
  </head>
  <body>
    <a href="index.html" class="back-btn">
      <span class="text">BACK</span>
      <span class="icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
      </span>
    </a>

    <form class="form">
      <p class="title">Register</p>
      <p class="message">Signup now and get full access to our app.</p>
      <div class="flex">
        <label>
          <input required="" placeholder="" type="text" class="input" />
          <span>Firstname</span>
        </label>

        <label>
          <input required="" placeholder="" type="text" class="input" />
          <span>Lastname</span>
        </label>
      </div>
      <label>
        <input required="" placeholder="" type="email" class="input" />
        <span>Email</span>
      </label>

      <label>
        <input required="" placeholder="" type="password" class="input" />
        <span>Password</span>
      </label>
      <label>
        <input required="" placeholder="" type="password" class="input" />
        <span>Confirm password</span>
      </label>
      <button class="submit">Submit</button>
      <p class="signin">Already have an acount ? <a href="sign-in.html">Sign in</a></p>
    </form>
  </body>
</html>
